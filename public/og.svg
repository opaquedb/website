  <!-- Text block -->
  <text x="326" y="262" font-family="DejaVu Sans, sans-serif" font-size="84" font-weight="bold" letter-spacing="-3" fill="#FFFFFF">The private</text>
  <text x="326" y="348" font-family="DejaVu Sans, sans-serif" font-size="84" font-weight="bold" letter-spacing="-3" fill="#FFFFFF">database.</text>

  <!-- Accent line (matches the homepage hero) -->

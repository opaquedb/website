  <text x="356" y="418" font-family="DejaVu Sans, sans-serif" font-size="25" fill="#aaaaaa">Run normal SQL on data that stays encrypted.</text>
  <text x="356" y="452" font-family="DejaVu Sans, sans-serif" font-size="25" fill="#aaaaaa">Even during computation.</text>
  <text x="356" y="486" font-family="DejaVu Sans, sans-serif" font-size="25" fill="#aaaaaa">Post-quantum secure. Built for real apps.</text>

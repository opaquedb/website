<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#050505"/>
  <!-- Frame border (matches site) -->
  <rect x="4" y="4" width="1192" height="622" fill="none" stroke="#111111" stroke-width="8"/>

  <!-- Logo (diamond + eye-off), scaled from the 512 source -->
  <g transform="translate(96, 232) scale(0.37109)">
    <rect x="156" y="156" width="200" height="200" fill="#CCFF00" rx="12" transform="rotate(45 256 256)"/>
    <g transform="translate(196, 196) scale(5)" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
      <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
